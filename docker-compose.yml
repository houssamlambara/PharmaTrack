version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: pharmatrack-db
    environment:
      POSTGRES_DB: PharmaTrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./BackEnd
    container_name: pharmatrack-backend
    ports:
      - "8080:8080"
    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/PharmaTrack
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres
    restart: on-failure

  frontend:
    build: ./FrontEnd
    container_name: pharmatrack-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
