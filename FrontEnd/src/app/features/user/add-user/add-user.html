<div class="p-6 max-w-4xl mx-auto">
    <div class="mb-8 flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900">Nouvel Utilisateur</h1>
            <p class="text-sm text-slate-500 mt-1">Ajouter un nouveau membre au système PharmaTrack</p>
        </div>
        <button routerLink="/users"
            class="flex items-center gap-2 px-4 py-2 bg-slate-100 text-slate-700 font-medium rounded-lg hover:bg-slate-200 transition-colors">
            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            Retour à la liste
        </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6 lg:p-8">

            <!-- Messages Flash -->
            <div *ngIf="successMessage"
                class="mb-6 p-4 bg-teal-50 text-teal-700 rounded-xl border border-teal-200 flex items-center gap-3 animate-fade-in">
                <span class="material-symbols-outlined">check_circle</span>
                <span class="font-medium">{{ successMessage }}</span>
            </div>

            <div *ngIf="errorMessage"
                class="mb-6 p-4 bg-red-50 text-red-700 rounded-xl border border-red-200 flex items-center gap-3 animate-fade-in">
                <span class="material-symbols-outlined">error</span>
                <span class="font-medium">{{ errorMessage }}</span>
            </div>

            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Nom -->
                    <div class="space-y-1.5">
                        <label class="text-sm font-semibold text-slate-700">Nom</label>
                        <input formControlName="nom" type="text" placeholder="Entrez le nom"
                            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-lg px-4 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all"
                            [ngClass]="{'border-red-400': registerForm.get('nom')?.invalid && registerForm.get('nom')?.touched}">
                        <div *ngIf="registerForm.get('nom')?.invalid && registerForm.get('nom')?.touched"
                            class="text-xs text-red-500 mt-1">
                            Nom requis (min 2 caractères)
                        </div>
                    </div>

                    <!-- Prénom -->
                    <div class="space-y-1.5">
                        <label class="text-sm font-semibold text-slate-700">Prénom</label>
                        <input formControlName="prenom" type="text" placeholder="Entrez le prénom"
                            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-lg px-4 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all"
                            [ngClass]="{'border-red-400': registerForm.get('prenom')?.invalid && registerForm.get('prenom')?.touched}">
                        <div *ngIf="registerForm.get('prenom')?.invalid && registerForm.get('prenom')?.touched"
                            class="text-xs text-red-500 mt-1">
                            Prénom requis (min 2 caractères)
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-slate-700">Adresse Email</label>
                    <input formControlName="email" type="email" placeholder="pharmacie@exemple.com"
                        class="w-full h-11 bg-slate-50 border border-slate-200 rounded-lg px-4 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all"
                        [ngClass]="{'border-red-400': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}">
                    <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
                        class="text-xs text-red-500 mt-1">
                        Email valide requis
                    </div>
                </div>

                <!-- Mot de passe et Rôle -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1.5">
                        <label class="text-sm font-semibold text-slate-700">Mot de passe provisoire</label>
                        <input formControlName="password" type="text" placeholder="Saisir un mot de passe"
                            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-lg px-4 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all"
                            [ngClass]="{'border-red-400': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}">
                        <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
                            class="text-xs text-red-500 mt-1">
                            Minimum 4 caractères
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-sm font-semibold text-slate-700">Rôle (Permissions)</label>
                        <div class="relative">
                            <select formControlName="role"
                                class="w-full h-11 bg-slate-50 border border-slate-200 rounded-lg px-4 appearance-none focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all cursor-pointer">
                                <option value="PHARMACIEN">Pharmacien (Standard)</option>
                                <option value="ADMIN">Administrateur (Tout accès)</option>
                            </select>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                                <span class="material-symbols-outlined text-[20px]">expand_more</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-100 flex justify-end">
                    <button [disabled]="isLoading" type="submit"
                        class="h-11 px-8 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg flex items-center gap-2 transition-all active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed">
                        <span *ngIf="isLoading"
                            class="material-symbols-outlined animate-spin text-[20px]">refresh</span>
                        <span *ngIf="!isLoading" class="material-symbols-outlined text-[20px]">add</span>
                        {{ isLoading ? 'Création en cours...' : 'Créer l\'utilisateur' }}
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
