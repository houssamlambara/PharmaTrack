<div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 lg:sticky lg:top-4">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-slate-900">Ajouter Employé</h3>
    </div>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <div *ngIf="successMessage"
            class="text-sm text-emerald-700 bg-emerald-50 px-4 py-3 rounded-xl border border-emerald-200">{{
            successMessage }}
        </div>
        <div *ngIf="errorMessage" class="text-sm text-red-700 bg-red-50 px-4 py-3 rounded-xl border border-red-200">{{
            errorMessage }}</div>

        <div class="flex gap-2">
            <div class="flex flex-col gap-1.5 w-1/2">
                <label class="text-xs font-bold uppercase text-slate-500 ml-1">Prénom</label>
                <input formControlName="prenom"
                    class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-emerald-500/50 transition-all outline-none"
                    placeholder="Prénom" type="text" />
            </div>

            <div class="flex flex-col gap-1.5 w-1/2">
                <label class="text-xs font-bold uppercase text-slate-500 ml-1">Nom</label>
                <input formControlName="nom"
                    class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-emerald-500/50 transition-all outline-none"
                    placeholder="Nom" type="text" />
            </div>
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold uppercase text-slate-500 ml-3">Email</label>
            <input formControlName="email"
                class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-emerald-500/50 transition-all outline-none"
                placeholder="email@pharmatrack.com" type="email" />
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold uppercase text-slate-500 ml-3">Rôle</label>
            <div class="relative">
                <select formControlName="role"
                    class="w-full pl-4 pr-10 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-emerald-500/50 appearance-none transition-all outline-none cursor-pointer">
                    <option value="CAISSIER">Caissier</option>
                    <option value="RESPONSABLE_STOCK">Responsable Stock</option>
                    <option value="ADMIN">Administrateur</option>
                </select>
                <span
                    class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 pointer-events-none">expand_more</span>
            </div>
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-bold uppercase text-slate-500 ml-3">Mot de passe</label>
            <input formControlName="password"
                class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-emerald-500/50 transition-all outline-none"
                placeholder="Mot de passe provisoire" type="password" />
        </div>

        <div class="flex gap-3 mt-2">
            <button [disabled]="isLoading"
                class="w-full py-3.5 rounded-full bg-emerald-500 text-white font-bold shadow-lg shadow-emerald-500/20 hover:bg-emerald-600 transition-all disabled:opacity-50"
                type="submit">
                {{ isLoading ? 'Création en cours...' : 'Ajouter Utilisateur' }}
            </button>
        </div>
    </form>
</div>
