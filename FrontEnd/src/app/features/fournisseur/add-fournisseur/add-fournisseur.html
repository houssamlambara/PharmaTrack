<div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
  <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2">
    <div class="p-1.5 bg-emerald-50 text-emerald-500 rounded-lg">
      <span class="material-symbols-outlined text-[20px]">add_business</span>
    </div>
    Nouveau Fournisseur
  </h3>

  <form [formGroup]="fournisseurForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

    <!-- Messages de succès / erreur -->
    <div *ngIf="successMessage"
      class="text-sm font-medium text-emerald-700 bg-emerald-50 px-4 py-3 rounded-xl border border-emerald-200 flex items-center gap-2 animate-fade-in">
      <span class="material-symbols-outlined text-[18px]">check_circle</span>
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage"
      class="text-sm font-medium text-red-700 bg-red-50 px-4 py-3 rounded-xl border border-red-200 flex items-center gap-2 animate-fade-in">
      <span class="material-symbols-outlined text-[18px]">error</span>
      {{ errorMessage }}
    </div>

    <div class="space-y-4">
      <!-- Nom -->
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Nom du fournisseur <span
            class="text-red-500">*</span></label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-slate-400 text-[18px]">domain</span>
          </div>
          <input formControlName="nom" type="text" placeholder="Ex: Pfizer Inc."
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 text-sm transition-all"
            [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': fournisseurForm.get('nom')?.invalid && fournisseurForm.get('nom')?.touched}">
        </div>
        <div *ngIf="fournisseurForm.get('nom')?.invalid && fournisseurForm.get('nom')?.touched"
          class="text-[11px] text-red-500 mt-1 ml-1 font-medium animate-fade-in">
          Nom requis (min 2 caractères)
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Email <span
            class="text-red-500">*</span></label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-slate-400 text-[18px]">mail</span>
          </div>
          <input formControlName="email" type="email" placeholder="contact@fournisseur.com"
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 text-sm transition-all"
            [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': fournisseurForm.get('email')?.invalid && fournisseurForm.get('email')?.touched}">
        </div>
        <div *ngIf="fournisseurForm.get('email')?.invalid && fournisseurForm.get('email')?.touched"
          class="text-[11px] text-red-500 mt-1 ml-1 font-medium animate-fade-in">
          <span *ngIf="fournisseurForm.get('email')?.errors?.['required']">Email requis</span>
          <span *ngIf="fournisseurForm.get('email')?.errors?.['email']">Format email invalide</span>
        </div>
      </div>

      <!-- Téléphone -->
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Téléphone <span
            class="text-red-500">*</span></label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-slate-400 text-[18px]">call</span>
          </div>
          <input formControlName="telephone" type="tel" placeholder="+212 5XX XX XX XX"
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 text-sm transition-all"
            [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': fournisseurForm.get('telephone')?.invalid && fournisseurForm.get('telephone')?.touched}">
        </div>
        <div *ngIf="fournisseurForm.get('telephone')?.invalid && fournisseurForm.get('telephone')?.touched"
          class="text-[11px] text-red-500 mt-1 ml-1 font-medium animate-fade-in">
          <span *ngIf="fournisseurForm.get('telephone')?.errors?.['required']">Téléphone requis</span>
          <span *ngIf="fournisseurForm.get('telephone')?.errors?.['pattern']">Format invalide</span>
        </div>
      </div>

      <!-- Adresse -->
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Adresse <span
            class="text-red-500">*</span></label>
        <div class="relative">
          <div class="absolute top-3 left-3 pointer-events-none">
            <span class="material-symbols-outlined text-slate-400 text-[18px]">location_on</span>
          </div>
          <textarea formControlName="adresse" placeholder="Adresse complète..."
            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 text-sm resize-none transition-all"
            rows="3"
            [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': fournisseurForm.get('adresse')?.invalid && fournisseurForm.get('adresse')?.touched}"></textarea>
        </div>
        <div *ngIf="fournisseurForm.get('adresse')?.invalid && fournisseurForm.get('adresse')?.touched"
          class="text-[11px] text-red-500 mt-1 ml-1 font-medium animate-fade-in">
          Adresse requise (min 5 caractères)
        </div>
      </div>
    </div>

    <div class="pt-2">
      <button type="submit" [disabled]="isLoading"
        class="h-12 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/25 transition-all active:scale-[0.98] hover:-translate-y-0.5 text-sm flex items-center justify-center gap-2 disabled:opacity-50 disabled:hover:translate-y-0 disabled:active:scale-100">
        <span *ngIf="isLoading" class="material-symbols-outlined text-[18px] animate-spin">refresh</span>
        <span *ngIf="!isLoading" class="material-symbols-outlined text-[18px]">save</span>
        <span>{{ isLoading ? 'Création en cours...' : 'Enregistrer le fournisseur' }}</span>
      </button>
    </div>
  </form>
</div>
