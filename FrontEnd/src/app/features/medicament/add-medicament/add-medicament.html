<div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
  <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2">
    <div class="p-1.5 bg-indigo-50 text-indigo-500 rounded-lg">
      <span class="material-symbols-outlined text-[20px]">vaccines</span>
    </div>
    Nouveau Médicament
  </h3>

  <form [formGroup]="medicamentForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

    <!-- Messages -->
    <div *ngIf="successMessage"
      class="text-sm font-medium text-emerald-700 bg-emerald-50 px-4 py-3 rounded-xl border border-emerald-200 flex items-center gap-2 animate-fade-in">
      <span class="material-symbols-outlined text-[18px]">check_circle</span>
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage"
      class="text-sm font-medium text-red-700 bg-red-50 px-4 py-3 rounded-xl border border-red-200 flex items-center gap-2 animate-fade-in">
      <span class="material-symbols-outlined text-[18px]">error</span>
      {{ errorMessage }}
    </div>

    <div class="space-y-4">

      <!-- Nom -->
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Nom du médicament <span
            class="text-red-500">*</span></label>
        <div class="relative">
          <input formControlName="nom" type="text" placeholder="Ex: Paracétamol 1000mg"
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm transition-all"
            [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': medicamentForm.get('nom')?.invalid && medicamentForm.get('nom')?.touched}">
        </div>
        <div *ngIf="medicamentForm.get('nom')?.invalid && medicamentForm.get('nom')?.touched"
          class="text-[11px] text-red-500 mt-1 ml-1 font-medium animate-fade-in">
          Nom requis (min 2 caractères)
        </div>
      </div>

      <!-- Code Barres -->
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Code-barres (EAN/UPC)</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-slate-400 text-[18px]">barcode</span>
          </div>
          <input formControlName="codeBarres" type="text" placeholder="Scanner ou taper..."
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm transition-all focus:bg-indigo-50/30">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <!-- Dosage -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Dosage <span
              class="text-red-500">*</span></label>
          <input formControlName="dosage" type="text" placeholder="Ex: 500mg"
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm transition-all"
            [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': medicamentForm.get('dosage')?.invalid && medicamentForm.get('dosage')?.touched}">
        </div>

        <!-- Forme -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Forme <span
              class="text-red-500">*</span></label>
          <select formControlName="forme"
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm transition-all appearance-none cursor-pointer"
            [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': medicamentForm.get('forme')?.invalid && medicamentForm.get('forme')?.touched}">
            <option value="" disabled selected>Choisir...</option>
            <option value="Comprimé">Comprimé</option>
            <option value="Sirop">Sirop</option>
            <option value="Gélule">Gélule</option>
            <option value="Pommade">Pommade</option>
            <option value="Injection">Injection</option>
            <option value="Sachet">Sachet</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <!-- Prix Unitaire -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Prix U. (DH) <span
              class="text-red-500">*</span></label>
          <input formControlName="prixUnitaire" type="number" step="0.01" placeholder="0.00"
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm transition-all"
            [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': medicamentForm.get('prixUnitaire')?.invalid && medicamentForm.get('prixUnitaire')?.touched}">
        </div>

        <!-- Seuil d'alerte -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Seuil Alerte</label>
          <input formControlName="seuilAlerte" type="number" min="1"
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm transition-all">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Catégorie -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Catégorie <span
              class="text-red-500">*</span></label>
          <div class="relative">
            <select formControlName="categorieId"
              class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm transition-all appearance-none cursor-pointer"
              [ngClass]="{'border-red-400 focus:border-red-400 focus:ring-red-400/20': medicamentForm.get('categorieId')?.invalid && medicamentForm.get('categorieId')?.touched}">
              <option value="" disabled selected>{{ isLoadingCategories ? 'Chargement...' : 'Sélectionner...' }}
              </option>
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.nom }}</option>
            </select>
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
              <span *ngIf="isLoadingCategories"
                class="material-symbols-outlined text-[18px] animate-spin">refresh</span>
              <span *ngIf="!isLoadingCategories" class="material-symbols-outlined text-[18px]">expand_more</span>
            </div>
          </div>
        </div>

        <!-- Date Expiration -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Date Expiration</label>
          <input formControlName="dateExpiration" type="date"
            class="w-full h-11 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm transition-all text-slate-700">
        </div>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5 ml-1">Description</label>
        <div class="relative">
          <textarea formControlName="description" placeholder="Notice, usage, précautions..."
            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 text-sm resize-none transition-all"
            rows="2"></textarea>
        </div>
      </div>

    </div>

    <div class="pt-2">
      <button type="submit" [disabled]="isLoading"
        class="h-12 w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/25 transition-all active:scale-[0.98] hover:-translate-y-0.5 text-sm flex items-center justify-center gap-2 disabled:opacity-50 disabled:hover:translate-y-0 disabled:active:scale-100">
        <span *ngIf="isLoading" class="material-symbols-outlined text-[18px] animate-spin">refresh</span>
        <span *ngIf="!isLoading" class="material-symbols-outlined text-[18px]">add_task</span>
        <span>{{ isLoading ? 'Création en cours...' : 'Ajouter le médicament' }}</span>
      </button>
    </div>
  </form>
</div>
