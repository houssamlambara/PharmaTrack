<div class="flex-1 flex flex-col h-full min-w-0 bg-slate-50 relative">
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 relative z-20">
    <div class="flex items-center gap-3">
      <h2 class="text-slate-900 text-lg font-bold">New Sale</h2>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-transparent">
        <span class="material-symbols-outlined text-primary text-[20px]">calendar_today</span>
        <span class="text-sm font-semibold text-slate-900">Oct 24, 2023 • 10:45 AM</span>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden relative z-10">
    <!-- Main Products Area -->
    <div class="flex-1 flex flex-col p-6 gap-6 overflow-hidden">
      <div class="w-full shrink-0">
        <label class="flex flex-col w-full">
          <div
            class="flex w-full items-stretch rounded-xl h-12 bg-white shadow-sm border border-slate-200 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
            <div class="flex items-center justify-center pl-4 pr-2">
              <span class="material-symbols-outlined text-slate-400">search</span>
            </div>
            <input
              class="flex w-full bg-transparent border-none text-slate-900 focus:ring-0 h-full placeholder:text-slate-400 px-2 text-base outline-none"
              placeholder="Search products by name, SKU or scan barcode..." />
            <div class="flex items-center justify-center pr-2">
              <button class="p-2 hover:bg-slate-50 rounded-lg text-slate-400 hover:text-primary transition-colors"
                title="Scan Barcode">
                <span class="material-symbols-outlined">barcode_scanner</span>
              </button>
            </div>
          </div>
        </label>
      </div>

      <!-- Category Filter -->
      <div class="flex gap-3 overflow-x-auto pb-2 shrink-0 custom-scrollbar">
        <button
          class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-primary text-white px-4 hover:bg-primary-dark shadow-sm shadow-primary/20 transition-all shrink-0">
          <span class="material-symbols-outlined text-[18px]">grid_view</span>
          <span class="text-sm font-bold">All Items</span>
        </button>
        <button
          class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-white border border-slate-200 px-4 hover:border-primary hover:text-primary transition-colors shrink-0 group">
          <span
            class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary transition-colors">pill</span>
          <span class="text-sm font-medium text-slate-700 group-hover:text-primary transition-colors">Antibiotics</span>
        </button>
        <button
          class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-white border border-slate-200 px-4 hover:border-primary hover:text-primary transition-colors shrink-0 group">
          <span
            class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary transition-colors">vital_signs</span>
          <span class="text-sm font-medium text-slate-700 group-hover:text-primary transition-colors">Vitamins</span>
        </button>
        <button
          class="flex h-9 items-center justify-center gap-x-2 rounded-full bg-white border border-slate-200 px-4 hover:border-primary hover:text-primary transition-colors shrink-0 group">
          <span
            class="material-symbols-outlined text-[18px] text-slate-400 group-hover:text-primary transition-colors">ecg_heart</span>
          <span class="text-sm font-medium text-slate-700 group-hover:text-primary transition-colors">Pain Relief</span>
        </button>
      </div>

      <!-- Product Grid -->
      <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
        <div class="grid grid-cols-[repeat(auto-fill,minmax(180px,1fr))] gap-4 pb-20">
          <div
            class="bg-white rounded-xl p-3 shadow-sm border border-transparent hover:border-primary hover:shadow-md cursor-pointer transition-all group flex flex-col h-full">
            <div class="bg-slate-50 rounded-lg aspect-[4/3] w-full mb-3 bg-center bg-cover relative"
              style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAz5z4IGvibV46kbD8I8KrSWNWeuxG6jRczWNSDI6Zsei4G2HcVRlcm1Cy8ASrDM2cillwS-axquag-RC3EMhpAJfE6CeG6D8EkKzKcFXOv9Im4ZyyiDC-Z1_swfO7wzDW4uIGCVTOoEzXJZC8vI7wt4EMqfDOKMvlH6iP04pN6ELcGGKVtRSNIzaAUlf0trXyOsSyYKGzCdJn3EC70fvbJC9Agp_CFvn5ni59foDlbVoA_9equ1uH4vbiQDc5jDZgkfZnUcSA51igK");'>
              <div
                class="absolute top-2 right-2 bg-white/90 px-2 py-0.5 rounded text-[10px] font-bold text-slate-500 border border-slate-100 backdrop-blur-sm">
                Stock: 142</div>
            </div>
            <h3 class="text-slate-900 font-bold text-sm leading-tight mb-1 line-clamp-2">Paracetamol 500mg</h3>
            <p class="text-slate-500 text-xs mb-3">20 Tablets / Box</p>
            <div class="mt-auto flex items-center justify-between">
              <span class="text-primary font-bold text-lg">$4.50</span>
              <button
                class="h-8 w-8 rounded-full bg-slate-50 text-slate-900 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
                <span class="material-symbols-outlined text-[20px]">add</span>
              </button>
            </div>
          </div>
          <div
            class="bg-white rounded-xl p-3 shadow-sm border border-transparent hover:border-primary hover:shadow-md cursor-pointer transition-all group flex flex-col h-full">
            <div class="bg-slate-50 rounded-lg aspect-[4/3] w-full mb-3 bg-center bg-cover relative"
              style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAxNi_aHLJlFtQA2TpjAOxp65SRdMos0Xo9JlUhjQz9pbFNdD1scWKp5ULD8pIECLqWSPjzNF66E_tyof8hFU-2JoD6AmS2I9V-ZN-eMR5QxJ5CwAP_HjpO2Qy2--n_D1XBQinzMAbVp1TyoUfG6g1OEDixmZmuP5yT3YhA4VgGwQerhdGi9JLbQA6vVxIqB3_c2f85l1oESp5WRn-F422JTftrQsW02RHbAzjIqCz4zKahN65ZJB6_opSGH2dCKTcw2joIwFh6EZwR");'>
              <div
                class="absolute top-2 right-2 bg-white/90 px-2 py-0.5 rounded text-[10px] font-bold text-slate-500 border border-slate-100 backdrop-blur-sm">
                Stock: 45</div>
            </div>
            <h3 class="text-slate-900 font-bold text-sm leading-tight mb-1 line-clamp-2">Amoxicillin 250mg</h3>
            <p class="text-slate-500 text-xs mb-3">60ml Suspension</p>
            <div class="mt-auto flex items-center justify-between">
              <span class="text-primary font-bold text-lg">$12.00</span>
              <button
                class="h-8 w-8 rounded-full bg-slate-50 text-slate-900 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
                <span class="material-symbols-outlined text-[20px]">add</span>
              </button>
            </div>
          </div>
          <div
            class="bg-white rounded-xl p-3 shadow-sm border border-transparent hover:border-primary hover:shadow-md cursor-pointer transition-all group flex flex-col h-full">
            <div class="bg-slate-50 rounded-lg aspect-[4/3] w-full mb-3 bg-center bg-cover relative"
              style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAJSkfFv24slxpfhrd991abrTwjVk8FVoqvKyILvR46B_WGDxM1PXENDJKkiMu8rq2HrGEMj2KItSullO0pTFZLtY-PRb92zkwEw3dPJX9NUlgQyPnp18l3vU3nAjwvHWrz2HZTuSToQzk1k1sPAeQel2B84xg0qMGJqC1Q97HndIrgBA8IGfdNxFP0CPYFJb2IwLstFotrFtV44Og7577S7tAcQI1qHW6a3ZvYPCvzDZr1By2LTX6NRZw05nEZNesD-jj3jqYaqXH1");'>
              <div
                class="absolute top-2 right-2 bg-white/90 px-2 py-0.5 rounded text-[10px] font-bold text-slate-500 border border-slate-100 backdrop-blur-sm">
                Stock: 80</div>
            </div>
            <h3 class="text-slate-900 font-bold text-sm leading-tight mb-1 line-clamp-2">Vitamin C 1000mg</h3>
            <p class="text-slate-500 text-xs mb-3">20 Effervescent Tabs</p>
            <div class="mt-auto flex items-center justify-between">
              <span class="text-primary font-bold text-lg">$8.90</span>
              <button
                class="h-8 w-8 rounded-full bg-slate-50 text-slate-900 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
                <span class="material-symbols-outlined text-[20px]">add</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Floating Toggle Tab -->
    <button (click)="toggleCart()" [style.right.px]="isCartOpen ? 320 : 0"
      class="absolute top-1/2 -translate-y-1/2 z-30 w-7 h-16 bg-white border border-slate-200 border-r-0 rounded-l-xl flex items-center justify-center text-slate-400 hover:text-primary hover:bg-slate-50 shadow-[-3px_0_10px_-2px_rgba(0,0,0,0.1)] transition-all duration-300 cursor-pointer">
      <span class="material-symbols-outlined text-[20px]">{{ isCartOpen ? 'chevron_right' : 'chevron_left' }}</span>
    </button>

    <!-- Cart / Checkout Area -->
    <div
      class="shrink-0 bg-white border-l border-slate-200 flex flex-col h-full shadow-xl z-20 transition-all duration-300 overflow-hidden"
      [ngClass]="{'w-[320px] opacity-100': isCartOpen, 'w-0 opacity-0 border-l-0': !isCartOpen}">

      <!-- Cart Items -->
      <div class="flex-1 overflow-y-auto p-3 flex flex-col custom-scrollbar divide-y divide-slate-100">
        <div class="flex items-center gap-3 relative group py-2">
          <div class="h-10 w-10 bg-slate-50 rounded-md bg-cover bg-center shrink-0 border border-slate-100"
            style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBVgrCVzcC4gkA13VLl1hw0OSSdtE-Yui9XLhl8JCOVuNIcIZO0Pbxhf4HuiaL3kjtCEfn93wwJSRF1b_HZhvZY7BgZrvHmd32q3IaLWxlgMrzCqpZLVQCix2ey1j2FfPxeMqaxGeTEM94fspw-xFykgUi511HA-SUs31atnP-TtGHAHOk5vmT497OlIA9eqHlkqWS5F-kVUxwTf71pEeQ8uyfq2f_zPP44Nh7LuVBv9vf2hAVjOHuODnkjJ1xTxWTds4XFkppaTstR");'>
          </div>
          <div class="flex flex-col flex-1">
            <h4 class="text-slate-900 font-bold text-xs line-clamp-1 pr-6">Paracetamol 500mg</h4>
            <div class="flex items-center justify-between mt-1">
              <div class="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded h-6 px-1">
                <button
                  class="w-5 flex items-center justify-center hover:bg-white hover:text-primary rounded h-4 text-slate-700 transition-all">
                  <span class="material-symbols-outlined text-[12px]">remove</span>
                </button>
                <span class="text-xs font-bold w-4 text-center text-slate-900">2</span>
                <button
                  class="w-5 flex items-center justify-center hover:bg-white hover:text-primary rounded h-4 text-slate-700 transition-all">
                  <span class="material-symbols-outlined text-[12px]">add</span>
                </button>
              </div>
              <span class="text-slate-900 font-bold text-sm">$9.00</span>
            </div>
            <button
              class="absolute top-2 right-0 text-slate-400 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
              <span class="material-symbols-outlined text-[16px]">close</span>
            </button>
          </div>
        </div>

        <div class="flex items-center gap-3 relative group py-2">
          <div class="h-10 w-10 bg-slate-50 rounded-md bg-cover bg-center shrink-0 border border-slate-100"
            style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDC1au0-eoz2BhAGpSe1sH_VpvTY6sGLdYdSUsnu9-GsC0opX7eFNbel8K0Ma8gwCA5XPE8uai9D8Fd8jqze09vswEgd7SMFxKc-nzlkDGQXKjrnVnZEpGQkWe4x1Q_L4mTs82Dr2AB0ORJA2_pqQOgLmxYLn2TKHc67Yrw-w-CzoJA6NrE3qxKKn1X65ZwqfLETMTFYp-lnPCBzKFXa-oafe7NWytJmNvCa8UDSNrIswp6Q7hYXw-j4A5d5_0MXLb0pRi3eGjQgt4q");'>
          </div>
          <div class="flex flex-col flex-1">
            <h4 class="text-slate-900 font-bold text-xs line-clamp-1 pr-6">Vitamin C 1000mg</h4>
            <div class="flex items-center justify-between mt-1">
              <div class="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded h-6 px-1">
                <button
                  class="w-5 flex items-center justify-center hover:bg-white hover:text-primary rounded h-4 text-slate-700 transition-all">
                  <span class="material-symbols-outlined text-[12px]">remove</span>
                </button>
                <span class="text-xs font-bold w-4 text-center text-slate-900">1</span>
                <button
                  class="w-5 flex items-center justify-center hover:bg-white hover:text-primary rounded h-4 text-slate-700 transition-all">
                  <span class="material-symbols-outlined text-[12px]">add</span>
                </button>
              </div>
              <span class="text-slate-900 font-bold text-sm">$8.90</span>
            </div>
            <button
              class="absolute top-2 right-0 text-slate-400 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
              <span class="material-symbols-outlined text-[16px]">close</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Checkout Footer Aligned with DTO -->
      <div class="mt-auto bg-slate-50 p-3 flex flex-col gap-2 border-t border-slate-200">
        <div class="flex justify-between items-center mb-0.5">
          <span class="text-slate-900 font-bold text-sm">Total Due</span>
          <span class="text-primary font-black text-xl">$17.90</span>
        </div>

        <!-- Payment Methods (Enum Aligned) -->
        <div>
          <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Payment Option</label>
          <div class="grid grid-cols-2 gap-2">
            <button
              class="flex flex-col items-center justify-center py-1.5 bg-primary/5 border-2 border-primary rounded-lg text-primary shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-primary/50">
              <span class="material-symbols-outlined text-[16px]">payments</span>
              <span class="text-[9px] font-bold mt-0.5">Cash</span>
            </button>
            <button
              class="flex flex-col items-center justify-center py-1.5 bg-white border border-slate-200 rounded-lg text-slate-500 hover:bg-slate-50 hover:text-primary hover:border-primary transition-all shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/50">
              <span class="material-symbols-outlined text-[16px]">credit_card</span>
              <span class="text-[9px] font-bold mt-0.5">Card</span>
            </button>
          </div>
        </div>

        <button
          class="w-full bg-primary text-white h-9 rounded-lg font-bold text-sm hover:bg-primary-dark shadow-sm shadow-primary/30 flex items-center justify-center gap-1.5 transition-all transform active:scale-[0.98] mt-1">
          <span>Process Sale</span>
          <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
        </button>
      </div>
    </div>
  </div>
</div>
