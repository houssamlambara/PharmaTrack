name: PharmaTrack CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- BACKEND (Spring Boot) ---
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BackEnd

    # PostgreSQL
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: PharmaTrack
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Donner les droits d'exécution au script Maven
        run: chmod +x mvnw

      - name: Build et Tests avec Maven

        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/PharmaTrack
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: root
        run: ./mvnw clean verify

  # --- FRONTEND (Angular) ---
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./FrontEnd

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Build Angular
        run: npm run build -- --configuration production